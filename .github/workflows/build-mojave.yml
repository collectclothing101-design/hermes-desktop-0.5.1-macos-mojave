name: Build macOS x64 (Mojave-compatible)

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]

jobs:
  build-mac-x64:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20 (build toolchain needs >= 20.19)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (rebuilds better-sqlite3 for Electron 26)
        run: npm install

      - name: Force native module to Electron 26 ABI (x64)
        run: npm run rebuild:native

      - name: Build + package x64 (dmg + zip)
        run: npx electron-vite build && npx electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ""

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-macos-x64
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
